<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRITARA Safety App</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="logo-section">
      <h1>VRITARA</h1>
      <p>Your Safety, Our Priority</p>
    </div>

    <div id="alertBox"></div>

    <div class="card" id="authCard">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        <div class="forgot-link">
          <a href="#" onclick="showForgot()">Forgot Password?</a>
        </div>
      </form>

      <form id="signupForm" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="signupPhone" placeholder="Enter your phone number" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>

      <div id="forgotForm" class="hidden">
        <h2>Reset Password</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="forgotEmail" placeholder="Enter your registered email">
        </div>
        <button class="btn btn-primary" onclick="handleForgot()">Reset Password</button>
        <button class="btn btn-secondary" onclick="switchTab('login')">Back to Login</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
